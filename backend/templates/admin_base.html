<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title or "Admin" }}</title>
  <style>
    body { font-family: "Segoe UI", sans-serif; background: #f4f1ed; color: #1f1f1f; margin: 0; }
    header { background: #1f1f1f; color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    header a { color: #fff; text-decoration: none; margin-right: 14px; }
    main { padding: 24px; max-width: 1100px; margin: 0 auto; }
    .card { background: #fff; border-radius: 12px; padding: 18px; box-shadow: 0 6px 18px rgba(0,0,0,0.08); margin-bottom: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; }
    input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; }
    button { background: #d07a4f; color: #fff; border: 0; padding: 10px 16px; border-radius: 8px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; }
    .muted { color: #666; font-size: 0.9rem; }
    .danger { background: #f2dede; color: #a94442; }
  </style>
</head>
<body>
  <header>
    <div>Portfolio Admin</div>
    <div>
      <a href="/admin">Dashboard</a>
      <a href="/admin/projects">Projects</a>
      <a href="/admin/posts">Posts</a>
      <a href="/admin/analytics">Analytics</a>
      <form action="/admin/logout" method="post" style="display:inline;">
        <button type="submit">Logout</button>
      </form>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
