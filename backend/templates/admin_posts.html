{% extends "admin_base.html" %}
{% block content %}
  <h1>Posts</h1>
  <div class="card">
    <h3>Add Post</h3>
    <form action="/admin/posts/create" method="post">
      <label>Title</label>
      <input type="text" name="title" required>
      <label>Excerpt</label>
      <textarea name="excerpt" rows="3" required></textarea>
      <label>Slug (e.g. ethical-data-practice)</label>
      <input type="text" name="slug">
      <label>Content</label>
      <textarea name="content" rows="5"></textarea>
      <label>URL</label>
      <input type="text" name="url">
      <label>Tags (comma-separated)</label>
      <input type="text" name="tags">
      <label>Published Date (YYYY-MM-DD)</label>
      <input type="text" name="published_at">
      <button type="submit">Create Post</button>
    </form>
  </div>

  <div class="card">
    <h3>Existing Posts</h3>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>Excerpt</th>
          <th>Slug</th>
          <th>Tags</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for post in posts %}
        <tr>
          <td>{{ post.id }}</td>
          <td>{{ post.title }}</td>
          <td>{{ post.excerpt }}</td>
          <td>{{ post.slug }}</td>
          <td>{{ post.tags | join(", ") }}</td>
          <td>
            <form action="/admin/posts/delete" method="post" style="display:inline;">
              <input type="hidden" name="post_id" value="{{ post.id }}">
              <button type="submit" class="danger">Delete</button>
            </form>
          </td>
        </tr>
        <tr>
          <td colspan="5">
            <form action="/admin/posts/update" method="post">
              <input type="hidden" name="post_id" value="{{ post.id }}">
              <label>Title</label>
              <input type="text" name="title" value="{{ post.title }}" required>
              <label>Excerpt</label>
              <textarea name="excerpt" rows="2" required>{{ post.excerpt }}</textarea>
              <label>Slug</label>
              <input type="text" name="slug" value="{{ post.slug }}">
              <label>Content</label>
              <textarea name="content" rows="4">{{ post.content }}</textarea>
              <label>URL</label>
              <input type="text" name="url" value="{{ post.url }}">
              <label>Tags (comma-separated)</label>
              <input type="text" name="tags" value="{{ post.tags | join(', ') }}">
              <label>Published Date (YYYY-MM-DD)</label>
              <input type="text" name="published_at" value="{{ post.published_at }}">
              <button type="submit">Update</button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% endblock %}
