<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <style>
    body { font-family: "Segoe UI", sans-serif; background: #f4f1ed; display: grid; place-items: center; height: 100vh; margin: 0; }
    .card { background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 6px 18px rgba(0,0,0,0.1); width: 320px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; }
    input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; }
    button { background: #d07a4f; color: #fff; border: 0; padding: 10px 16px; border-radius: 8px; width: 100%; cursor: pointer; }
    .error { color: #a94442; margin-bottom: 10px; }
  </style>
</head>
<body>
  <form class="card" method="post">
    <h2>Admin Login</h2>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <label for="password">Password</label>
    <input type="password" name="password" id="password" required>
    <button type="submit">Login</button>
  </form>
</body>
</html>
