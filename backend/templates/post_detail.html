<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ post.title }}</title>
  <style>
    body { font-family: "Segoe UI", sans-serif; background: #f4f1ed; color: #1f1f1f; margin: 0; }
    main { max-width: 860px; margin: 0 auto; padding: 40px 20px 80px; }
    h1 { margin-bottom: 12px; }
    .meta { color: #6a6a6a; margin-bottom: 24px; }
    .content { line-height: 1.7; font-size: 1.05rem; white-space: pre-wrap; }
    a { color: #1f6f5c; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <a href="/">← Back to portfolio</a>
    <h1>{{ post.title }}</h1>
    <div class="meta">
      {% if post.published_at %}Published {{ post.published_at }}{% endif %}
    </div>
    <div class="content">{{ post.content or post.excerpt }}</div>
  </main>
</body>
</html>
