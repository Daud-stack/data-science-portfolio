{% extends "admin_base.html" %}
{% block content %}
  <h1>Projects</h1>
  <div class="card">
    <h3>Add Project</h3>
    <form action="/admin/projects/create" method="post">
      <label>Title</label>
      <input type="text" name="title" required>
      <label>Description</label>
      <textarea name="description" rows="3" required></textarea>
      <label>Image Path (relative, e.g. Images/Projects/1.jpg)</label>
      <input type="text" name="image">
      <label>Tags (comma-separated)</label>
      <input type="text" name="tags">
      <label>Case Study URL</label>
      <input type="text" name="case_study_url">
      <label>Source URL</label>
      <input type="text" name="source_url">
      <button type="submit">Create Project</button>
    </form>
  </div>

  <div class="card">
    <h3>Existing Projects</h3>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>Description</th>
          <th>Tags</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for project in projects %}
        <tr>
          <td>{{ project.id }}</td>
          <td>{{ project.title }}</td>
          <td>{{ project.description }}</td>
          <td>{{ project.tags | join(", ") }}</td>
          <td>
            <form action="/admin/projects/delete" method="post" style="display:inline;">
              <input type="hidden" name="project_id" value="{{ project.id }}">
              <button type="submit" class="danger">Delete</button>
            </form>
          </td>
        </tr>
        <tr>
          <td colspan="5">
            <form action="/admin/projects/update" method="post">
              <input type="hidden" name="project_id" value="{{ project.id }}">
              <label>Title</label>
              <input type="text" name="title" value="{{ project.title }}" required>
              <label>Description</label>
              <textarea name="description" rows="2" required>{{ project.description }}</textarea>
              <label>Image Path</label>
              <input type="text" name="image" value="{{ project.image }}">
              <label>Tags (comma-separated)</label>
              <input type="text" name="tags" value="{{ project.tags | join(', ') }}">
              <label>Case Study URL</label>
              <input type="text" name="case_study_url" value="{{ project.case_study_url }}">
              <label>Source URL</label>
              <input type="text" name="source_url" value="{{ project.source_url }}">
              <button type="submit">Update</button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% endblock %}
